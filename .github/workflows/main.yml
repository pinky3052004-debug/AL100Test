name: Android Emulator 5x Parallel Stream

on:
  workflow_dispatch:

# ── 5 Jobs တပြိုင်နက် run မည် ──
jobs:
  emulator-1:
    uses: ./.github/workflows/emulator-job.yml
    with:
      job_number: 1
    secrets: inherit

  emulator-2:
    uses: ./.github/workflows/emulator-job.yml
    with:
      job_number: 2
    secrets: inherit

  emulator-3:
    uses: ./.github/workflows/emulator-job.yml
    with:
      job_number: 3
    secrets: inherit

  emulator-4:
    uses: ./.github/workflows/emulator-job.yml
    with:
      job_number: 4
    secrets: inherit

  emulator-5:
    uses: ./.github/workflows/emulator-job.yml
    with:
      job_number: 5
    secrets: inherit
