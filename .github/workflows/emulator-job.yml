name: Android Emulator + YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install FFmpeg and Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg xvfb aapt x11-utils

      - name: Download APK
        run: |
          wget -q -O /tmp/app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"
          echo "APK size: $(du -sh /tmp/app.apk)"

      - name: Start Virtual Display
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac &
          sleep 5
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "Xvfb started!"

      - name: Create Stream Script
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          cat > /tmp/stream.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          export DISPLAY=:99
          echo "=== Emulator Ready! ==="

          adb root || true
          sleep 2

          # Ad Block
          adb shell settings put global private_dns_mode hostname || true
          adb shell settings put global private_dns_specifier dns.adguard.com || true
          echo "Ads blocked!"

          # APK Install
          adb install -r /tmp/app.apk
          echo "APK Installed!"

          # Screen Unlock
          adb shell input keyevent 82
          sleep 2

          # App Launch
          echo "=== Launching App ==="
          adb shell am start -n "network.kalock.myanmar2d/.MainActivity"
          sleep 10
          echo "App Launched!"

          # Stream via x11grab (Xvfb display capture)
          echo "=== Starting YouTube Stream via x11grab ==="
          ffmpeg \
            -f x11grab \
            -framerate 30 \
            -video_size 1280x720 \
            -i :99.0+0,0 \
            -f lavfi \
            -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -c:v libx264 \
            -preset ultrafast \
            -tune zerolatency \
            -pix_fmt yuv420p \
            -r 30 \
            -g 60 \
            -b:v 4500k \
            -maxrate 4500k \
            -bufsize 9000k \
            -c:a aac \
            -ar 44100 \
            -b:a 128k \
            -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"
          SCRIPT
          chmod +x /tmp/stream.sh

      - name: Run Emulator and Stream
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DISPLAY: ':99'
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          # window mode ဖြင့် run - Xvfb display ပေါ်တွင် ပေါ်မည်
          emulator-options: -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -memory 4096 -no-window
          script: bash /tmp/stream.sh

      - name: Show Logs on Failure
        if: failure()
        run: |
          cat /tmp/emulator.log 2>/dev/null || echo "No emulator log"
