name: Android Emulator + YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3 python3-pip fonts-dejavu-core
          sudo apt-get install -y fonts-noto fonts-noto-cjk || true
          pip3 install Pillow --break-system-packages
          fc-cache -fv || true
          echo "✅ Done!"

      - name: Download APK
        run: |
          wget -q -O /tmp/app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"
          echo "✅ APK: $(du -sh /tmp/app.apk)"

      - name: Create Modern Compositor Script
        run: |
          cat > /tmp/compositor.py << 'PYEOF'
          #!/usr/bin/env python3
          import subprocess, sys, time, threading, io, random, datetime, os, math
          from PIL import Image, ImageDraw, ImageFont
      
          W, H = 1280, 720
          FPS  = 20
          INTERVAL = 1.0 / FPS
      
          def mmt_now():
              return datetime.datetime.utcnow() + datetime.timedelta(hours=6, minutes=30)
      
          now   = mmt_now()
          hour  = now.hour
          date  = now.strftime("%d-%m-%Y")
      
          DAYS_MY = {
              "Monday":    "တနင်္လာ",
              "Tuesday":   "အင်္ဂါ",
              "Wednesday": "ဗုဒ္ဓဟူး",
              "Thursday":  "ကြာသပတေး",
              "Friday":    "သောကြာ",
              "Saturday":  "စနေ",
              "Sunday":    "တနင်္ဂနွေ",
          }
          day_en = now.strftime("%A")
          day_my = DAYS_MY.get(day_en, day_en)
      
          if hour < 12:
              SESS_TIME  = "12:01 PM"
              SESS_MY    = "မနက်ပိုင်း"
          else:
              SESS_TIME  = "4:30 PM"
              SESS_MY    = "ညနေပိုင်း"
      
          def rnd3():
              return f"{random.randint(0,99):02d}-{random.randint(0,99):02d}-{random.randint(0,99):02d}"
      
          PAT  = rnd3()
          MAIN = rnd3()
          ALT  = rnd3()
      
          sys.stderr.write(f"[{date}] {SESS_TIME} | PAT={PAT} MAIN={MAIN} ALT={ALT}\n")
          sys.stderr.flush()
      
          MY_FONT_PATHS = [
              "/usr/share/fonts/truetype/noto/NotoSansMyanmar-Bold.ttf",
              "/usr/share/fonts/truetype/noto/NotoSansMyanmar-Regular.ttf",
              "/usr/share/fonts/opentype/noto/NotoSansMyanmar-Bold.otf",
              "/usr/share/fonts/opentype/noto/NotoSansMyanmar-Regular.otf",
              "/usr/share/fonts/truetype/noto/NotoSerifMyanmar-Bold.ttf",
              "/usr/share/fonts/truetype/noto/NotoSerifMyanmar-Regular.ttf",
          ]
          EN_FONT_PATHS = [
              "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
              "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf",
          ]
      
          def find_font(paths):
              for p in paths:
                  if os.path.exists(p):
                      return p
              return None
      
          MY_PATH = find_font(MY_FONT_PATHS)
          EN_PATH = find_font(EN_FONT_PATHS)
      
          def load_font(size, myanmar=False):
              path = MY_PATH if (myanmar and MY_PATH) else EN_PATH
              if path:
                  try:
                      return ImageFont.truetype(path, size)
                  except:
                      pass
              return ImageFont.load_default()
      
          F_CLOCK  = load_font(52)
          F_NUM    = load_font(64)
          F_DATE   = load_font(40)
          F_SESS   = load_font(38)
          F_LABEL  = load_font(26, myanmar=True)
          F_DAY    = load_font(28, myanmar=True)
          F_SUB    = load_font(30, myanmar=True)
          F_SUB_SM = load_font(20, myanmar=True)
          F_TINY   = load_font(18, myanmar=True)
      
          # MODERN COLOR PALETTE (Premium Dark Theme)
          BG_DARK      = (18, 20, 26)       # Rich Slate Dark
          CARD_BG      = (28, 32, 42)       # Card Background
          CARD_ACCENT  = (40, 46, 59)       # Soft Border
          TEXT_MAIN    = (255, 255, 255)   # White
          TEXT_MUTED   = (154, 165, 177)   # Cool Grey
          
          # Accent Colors
          ACCENT_BLUE  = (0, 150, 255)      # Cyber Blue
          ACCENT_GREEN = (0, 224, 142)      # Emerald Green
          ACCENT_RED   = (255, 69, 96)       # Modern Coral Red
          ACCENT_GOLD  = (254, 199, 46)      # Premium Gold
      
          def pill(draw, x1, y1, x2, y2, fill, outline=None, r=12, width=1):
              draw.rounded_rectangle([x1,y1,x2,y2], radius=r,
                                     fill=fill, outline=outline,
                                     width=width if outline else 0)
      
          def text_c(draw, txt, cx, cy, font, color):
              bbox = draw.textbbox((0,0), txt, font=font)
              tw = bbox[2]-bbox[0]; th = bbox[3]-bbox[1]
              x = cx - tw//2; y = cy - th//2
              draw.text((x,y), txt, font=font, fill=color)
      
          PHONE_X, PHONE_Y = 330, 15
          PHONE_W, PHONE_H = 620, 690
      
          LX1, LX2 = 16, 314
          LC = (LX1+LX2)//2
          RX1, RX2 = 966, 1264
          RC = (RX1+RX2)//2
      
          def build_bg():
              # Main background
              img = Image.new("RGB", (W, H), BG_DARK)
              d   = ImageDraw.Draw(img)
      
              # LEFT PANEL
              # Session Time Card
              pill(d, LX1, 15, LX2, 75, ACCENT_BLUE, r=14)
              text_c(d, SESS_TIME, LC, 45, F_SESS, TEXT_MAIN)
      
              # Day & Session Label
              pill(d, LX1, 90, LX2, 170, CARD_BG, outline=CARD_ACCENT, r=14)
              text_c(d, day_my, LC, 118, F_DAY, TEXT_MAIN)
              text_c(d, SESS_MY, LC, 148, F_TINY, TEXT_MUTED)
      
              # Status Label
              pill(d, LX1, 185, LX2, 245, ACCENT_RED, r=14)
              text_c(d, "ထွက်ကြဟန်း", LC, 215, F_LABEL, TEXT_MAIN)
      
              # Sub Label
              pill(d, LX1, 260, LX2, 310, CARD_BG, outline=CARD_ACCENT, r=12)
              text_c(d, "ဟောတိပ်", LC, 285, F_TINY, TEXT_MUTED)
      
              # PAT Value Card (Big Number)
              pill(d, LX1, 325, LX2, 425, CARD_BG, outline=ACCENT_GOLD, r=16, width=2)
              text_c(d, PAT, LC, 375, F_NUM, ACCENT_GOLD)
      
              # Date Card
              pill(d, LX1, 440, LX2, 490, CARD_BG, outline=CARD_ACCENT, r=12)
              text_c(d, date, LC, 465, F_TINY, TEXT_MUTED)
      
              # RIGHT PANEL
              # Date Top Right
              pill(d, RX1, 15, RX2, 75, CARD_BG, outline=CARD_ACCENT, r=14)
              text_c(d, date, RC, 45, F_DATE, TEXT_MAIN)
      
              # PAT Badge Right
              pill(d, RX1, 90, RX2, 140, CARD_BG, outline=ACCENT_GOLD, r=12)
              text_c(d, f"ပတ်သီး  {PAT}", RC, 115, F_TINY, ACCENT_GOLD)
      
              # MAIN Title
              pill(d, RX1, 155, RX1+140, 205, CARD_BG, outline=CARD_ACCENT, r=12)
              text_c(d, "မိန်း", RX1+70, 180, F_LABEL, TEXT_MUTED)
      
              # MAIN Value Card
              pill(d, RX1, 220, RX2, 320, CARD_BG, outline=ACCENT_GREEN, r=16, width=2)
              text_c(d, MAIN, RC, 270, F_NUM, ACCENT_GREEN)
      
              # ALT Title
              pill(d, RX1, 335, RX1+140, 385, CARD_BG, outline=CARD_ACCENT, r=12)
              text_c(d, "အရံ", RX1+70, 360, F_LABEL, TEXT_MUTED)
      
              # ALT Value Card
              pill(d, RX1, 400, RX2, 500, CARD_BG, outline=ACCENT_GREEN, r=16, width=2)
              text_c(d, ALT, RC, 450, F_NUM, ACCENT_GREEN)
      
              return img
      
          BG = build_bg()
      
          last_screen = None
          lock = threading.Lock()
          running = True
      
          def grab():
              global last_screen, running
              while running:
                  try:
                      r = subprocess.run(
                          ["adb","exec-out","screencap","-p"],
                          capture_output=True, timeout=15)
                      if r.returncode == 0 and len(r.stdout) > 1000:
                          with lock:
                              last_screen = r.stdout
                  except Exception as e:
                      sys.stderr.write(f"grab err: {e}\n")
                  time.sleep(0.5)
      
          threading.Thread(target=grab, daemon=True).start()
      
          sys.stderr.write("Waiting for screen...\n"); sys.stderr.flush()
          for _ in range(120):
              with lock:
                  if last_screen: break
              time.sleep(0.5)
      
          if not last_screen:
              sys.stderr.write("No screen!\n"); sys.stderr.flush(); sys.exit(1)
      
          sys.stderr.write("Compositing started!\n"); sys.stderr.flush()
      
          SUB_TEXTS = [
              "Subscribe လုပ်ပြီး Bell နှိပ်ပါ!",
              "Like နှင့် Share လုပ်ပေးပါ!",
              "LIVE ကြည့်ပေးတဲ့အတွက် ကျေးဇူးတင်ပါ",
              "Notification Bell နှိပ်ပါ!",
          ]
          sub_idx  = 0
          sub_tick = 0
          SUB_CYCLE = FPS * 4
      
          out = sys.stdout.buffer
          frame_n = 0
      
          try:
              while True:
                  t0 = time.time()
                  frame_n += 1
                  sub_tick += 1
                  if sub_tick >= SUB_CYCLE:
                      sub_tick = 0
                      sub_idx = (sub_idx + 1) % len(SUB_TEXTS)
      
                  frame = BG.copy()
                  d2 = ImageDraw.Draw(frame)
      
                  # Realtime Clock (Clean Card)
                  t = mmt_now()
                  clock_str = t.strftime("%H:%M:%S")
                  pill(d2, LX1, 90, LX2, 140, CARD_BG, outline=CARD_ACCENT, r=12)
                  text_c(d2, clock_str, LC, 115, F_CLOCK, ACCENT_BLUE)
      
                  # Phone Screen Frame (Modern Border)
                  with lock: raw = last_screen
                  try:
                      phone_img = Image.open(io.BytesIO(raw)).convert("RGB")
                      phone_img.thumbnail((PHONE_W, PHONE_H), Image.LANCZOS)
                      pw, ph = phone_img.size
                      px = PHONE_X + (PHONE_W - pw) // 2
                      py = PHONE_Y + (PHONE_H - ph) // 2
                      
                      # Phone outer container
                      d2.rounded_rectangle(
                          [PHONE_X-4, PHONE_Y-4, PHONE_X+PHONE_W+4, PHONE_Y+PHONE_H+4],
                          radius=20, fill=CARD_BG, outline=CARD_ACCENT, width=2)
                      frame.paste(phone_img, (px, py))
                  except Exception as e:
                      sys.stderr.write(f"paste err: {e}\n")
      
                  # Modern Dynamic Subscribe Bar
                  pulse = 0.85 + 0.15 * math.sin(frame_n * 0.12)
                  bar_color = (int(35 * pulse), int(40 * pulse), int(55 * pulse)) # Dynamic Card Blue
                  
                  pill(d2, 16, 535, W-16, 605, bar_color, outline=CARD_ACCENT, r=16, width=1)
      
                  # Notification Indicator
                  bell_r = int(14 + 3 * math.sin(frame_n * 0.2))
                  bx, by = 60, 570
                  d2.ellipse([bx-bell_r, by-bell_r, bx+bell_r, by+bell_r],
                             fill=ACCENT_GOLD, outline=TEXT_MAIN)
      
                  # Fading Text Effect
                  sub_text = SUB_TEXTS[sub_idx]
                  alpha_f = min(1.0, sub_tick / 10)
                  txt_color = (int(255*alpha_f), int(255*alpha_f), int(255*alpha_f))
                  text_c(d2, sub_text, W//2 - 20, 570, F_SUB, txt_color)
      
                  # Premium Subscribe Button
                  pill(d2, W-216, 547, W-32, 593, ACCENT_RED, r=10)
                  text_c(d2, "SUBSCRIBE", W-124, 570, F_SUB_SM, TEXT_MAIN)
      
                  # Live Badge
                  pill(d2, RX1, 535, RX2, 575, CARD_BG, outline=ACCENT_RED, r=10, width=1)
                  text_c(d2, "• LIVE NOW", RC, 555, F_SUB_SM, ACCENT_RED)
      
                  out.write(frame.tobytes())
                  out.flush()
      
                  if frame_n % 100 == 0:
                      sys.stderr.write(f"frames={frame_n} t={clock_str}\n")
                      sys.stderr.flush()
      
                  dt = INTERVAL - (time.time() - t0)
                  if dt > 0: time.sleep(dt)
      
          except BrokenPipeError:
              sys.stderr.write("Done.\n")
          finally:
              running = False
          PYEOF
          chmod +x /tmp/compositor.py
          echo "✅ Modern Compositor ready!"
    
      - name: Create Stream Script
        run: |
          cat > /tmp/stream.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          echo "=== Emulator Ready ==="

          adb root || true
          sleep 5

          adb shell settings put global private_dns_mode hostname   || true
          adb shell settings put global private_dns_specifier dns.adguard.com || true

          adb install -r /tmp/app.apk
          echo "APK installed"

          adb shell input keyevent 82; sleep 1
          adb shell input keyevent 4;  sleep 1
          adb shell input keyevent 82; sleep 2

          adb shell am start -n "network.kalock.myanmar2d/.MainActivity"
          sleep 20

          sleep 3
          adb shell input keyevent 66; sleep 1
          adb shell input tap 512 328; sleep 2
          adb shell input keyevent 66; sleep 1
          echo "Dialog dismissed"

          echo "=== Starting stream ==="

          python3 /tmp/compositor.py 2>/tmp/comp.log | \
          ffmpeg \
            -re \
            -f rawvideo \
            -pixel_format rgb24 \
            -video_size 1280x720 \
            -framerate 20 \
            -i pipe:0 \
            -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -c:v libx264 \
            -preset ultrafast \
            -tune zerolatency \
            -pix_fmt yuv420p \
            -r 20 \
            -g 40 \
            -b:v 2500k \
            -maxrate 3000k \
            -bufsize 6000k \
            -c:a aac \
            -ar 44100 \
            -b:a 128k \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"

          cat /tmp/comp.log
          echo "Stream ended!"
          SCRIPT
          chmod +x /tmp/stream.sh

      - name: Run Emulator and Stream
        uses: reactivecircus/android-emulator-runner@v2
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: >-
            -no-audio -no-boot-anim -no-snapshot
            -gpu swiftshader_indirect -memory 4096 -no-window
          script: bash /tmp/stream.sh

      - name: Logs on Failure
        if: failure()
        run: |
          echo "=== Compositor Log ==="
          cat /tmp/comp.log 2>/dev/null || echo "no compositor log"
          echo "=== Emulator Log ==="
          cat /tmp/emulator.log 2>/dev/null || echo "no emulator log"
