name: Android Emulator + YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          echo "✅ Dependencies installed!"

      - name: Download APK
        run: |
          wget -q -O /tmp/app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"
          echo "✅ APK size: $(du -sh /tmp/app.apk)"

      - name: Create Stream Script
        run: |
          cat > /tmp/stream.sh << 'SCRIPT'
          #!/bin/bash
          echo "=== ✅ Emulator Ready! ==="

          adb root || true
          sleep 3

          # Ad Block
          adb shell settings put global private_dns_mode hostname || true
          adb shell settings put global private_dns_specifier dns.adguard.com || true
          echo "✅ Ads blocked!"

          # APK Install
          adb install -r /tmp/app.apk
          echo "✅ APK Installed!"

          # Screen Unlock
          adb shell input keyevent 82
          sleep 1
          adb shell input keyevent 4
          sleep 1
          adb shell input keyevent 82
          sleep 2
          echo "✅ Screen Unlocked!"

          # App Launch
          echo "=== 🚀 Launching App ==="
          adb shell am start -n "network.kalock.myanmar2d/.MainActivity"
          sleep 15
          echo "✅ App Launched!"

          # Dialog dismiss
          sleep 3
          adb shell input keyevent 66
          sleep 1
          adb shell input tap 512 328
          sleep 2
          adb shell input keyevent 66
          sleep 1
          echo "✅ Dialog dismissed!"

          # -----------------------------------------------
          # ** V5 - အကောင်းဆုံး နည်းလမ်း **
          #
          # adb exec-out screencap -p က raw PNG bytes တွေကို
          # stdout ကနေ ထုတ်တယ်
          #
          # ffmpeg -f image2pipe သည် stdin ကနေ PNG stream ကို
          # တစ်ဆက်တည်း ဖတ်နိုင်တယ်
          #
          # FIFO pipe သုံးပြီး:
          #   adb screencap → FIFO → ffmpeg → YouTube
          #
          # ဒါပေမဲ့ adb screencap နှေးတဲ့ပြဿနာကို
          # tee + frame duplicate နဲ့ ဖြေရှင်းမယ်:
          #   - adb screencap loop → /tmp/frame_NNN.png ဆွဲသိမ်း
          #   - ffmpeg က /tmp/frames/ folder ကို glob ဖတ်
          #   - frame အသစ်မရောက်သေးရင် ffmpeg က rate ချိန်ပြီး ဟောင်းကိုထပ်ဆွဲ
          # -----------------------------------------------

          echo "=== 📸 Starting capture + stream pipeline ==="

          # frames folder ဆောက်တာ
          mkdir -p /tmp/frames
          FRAME_DIR=/tmp/frames
          FRAME_NUM=0

          # ffmpeg ကို named pipe မှတဆင့် PNG stream ပို့မယ်
          PIPE=/tmp/ffpipe
          mkfifo $PIPE

          # -----------------------------------------------
          # adb screencap → pipe ထဲ တိုက်ရိုက် stream
          # ffmpeg က image2pipe format နဲ့ ဖတ်မယ်
          # adb နှေးတာကြောင့် fps မမှန်ရင်
          # -use_wallclock_as_timestamps 1 နဲ့ timestamp sync မယ်
          # -----------------------------------------------

          # Background: adb screencap loop → pipe
          (
            while true; do
              # screencap တစ်ကြိမ် ဆွဲပြီး pipe ထဲ ထည့်တာ
              adb exec-out screencap -p 2>/dev/null >> $PIPE
            done
          ) &
          ADB_PID=$!
          echo "✅ ADB capture started! PID: $ADB_PID"

          # ffmpeg: pipe ကနေ PNG frames ဖတ်ပြီး YouTube stream
          # -use_wallclock_as_timestamps: adb နှေးရင် timestamp ကို wall clock နဲ့ align မယ်
          # -vf fps=30: output ကို 30fps မှာ fix မယ် (adb rate ကိုမဆိုင်)
          # -fflags +genpts: PTS generate မယ် (stutter ကာကွယ်)
          ffmpeg \
            -use_wallclock_as_timestamps 1 \
            -fflags +genpts+discardcorrupt \
            -f image2pipe \
            -vcodec png \
            -i $PIPE \
            -f lavfi \
            -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,fps=fps=30" \
            -c:v libx264 \
            -preset veryfast \
            -tune zerolatency \
            -pix_fmt yuv420p \
            -g 60 \
            -b:v 3000k \
            -maxrate 3500k \
            -bufsize 14000k \
            -c:a aac \
            -ar 44100 \
            -b:a 128k \
            -shortest \
            -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"

          kill $ADB_PID 2>/dev/null
          rm -f $PIPE
          echo "✅ Stream ended!"
          SCRIPT
          chmod +x /tmp/stream.sh
          echo "✅ Stream script created!"

      - name: Run Emulator and Stream
        uses: reactivecircus/android-emulator-runner@v2
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          emulator-options: >-
            -no-audio
            -no-boot-anim
            -no-snapshot
            -gpu swiftshader_indirect
            -memory 4096
            -no-window
          script: bash /tmp/stream.sh

      - name: Show Logs on Failure
        if: failure()
        run: |
          echo "=== Emulator Log ==="
          cat /tmp/emulator.log 2>/dev/null || echo "No emulator log"
          echo "=== ADB Devices ==="
          adb devices 2>/dev/null || echo "ADB not available"
