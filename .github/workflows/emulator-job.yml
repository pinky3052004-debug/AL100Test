name: Android Emulator + YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # ===================================================
      # KVM ကို enable လုပ်တာ (emulator အမြန်ဆုံး run ဖို့)
      # ===================================================
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ===================================================
      # Java 17 install
      # ===================================================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ===================================================
      # လိုအပ်တဲ့ package တွေ install လုပ်တာ
      # scrcpy ပါ ထည့်ထားတယ် - screen mirror အတွက်
      # ===================================================
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            x11-utils \
            xdotool \
            feh \
            wmctrl \
            scrcpy \
            adb
          echo "✅ Dependencies installed!"

      # ===================================================
      # APK ကို download လုပ်တာ
      # ===================================================
      - name: Download APK
        run: |
          wget -q -O /tmp/app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"
          echo "✅ APK size: $(du -sh /tmp/app.apk)"

      # ===================================================
      # Virtual Display စတင်တာ (1280x720)
      # ===================================================
      - name: Start Virtual Display
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
          sleep 5
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Xvfb started!"

      # ===================================================
      # Stream Script ဆောက်တာ
      # ===================================================
      - name: Create Stream Script
        run: |
          cat > /tmp/stream.sh << 'SCRIPT'
          #!/bin/bash
          export DISPLAY=:99
          echo "=== ✅ Emulator Ready! ==="

          # Root access ယူတာ
          adb root || true
          sleep 3

          # -----------------------------------------------
          # Ad Block - AdGuard DNS သုံးတာ
          # -----------------------------------------------
          adb shell settings put global private_dns_mode hostname || true
          adb shell settings put global private_dns_specifier dns.adguard.com || true
          echo "✅ Ads blocked via AdGuard DNS!"

          # -----------------------------------------------
          # APK Install
          # -----------------------------------------------
          adb install -r /tmp/app.apk
          echo "✅ APK Installed!"

          # -----------------------------------------------
          # Screen Unlock လုပ်တာ
          # -----------------------------------------------
          adb shell input keyevent 82
          sleep 1
          adb shell input keyevent 4
          sleep 1
          adb shell input keyevent 82
          sleep 2
          echo "✅ Screen Unlocked!"

          # -----------------------------------------------
          # App Launch လုပ်တာ
          # -----------------------------------------------
          echo "=== 🚀 App Launching... ==="
          adb shell am start -n "network.kalock.myanmar2d/.MainActivity"
          sleep 15
          echo "✅ App Launched!"

          # -----------------------------------------------
          # *** အဓိက FIX ***
          # Nested Virtualization Warning Dialog ကို auto-dismiss လုပ်တာ
          # Dialog ထွက်ရင် OK button ကို tap လုပ်မယ်
          # -----------------------------------------------
          echo "=== 🔧 Dismissing nested virtualization dialog... ==="
          sleep 3

          # Enter key နဲ့ dismiss လုပ်ကြည့်တာ
          adb shell input keyevent 66
          sleep 1

          # OK button တည်နေရာကို tap လုပ်တာ (emulator screen ပေါ်မှာ)
          # Dialog OK button က emulator screen center အနီးမှာ ရှိတယ်
          adb shell input tap 512 328
          sleep 2

          # Dialog သေချာပျောက်အောင် နောက်တစ်ကြိမ် check
          adb shell input keyevent 66
          sleep 1

          echo "✅ Dialog dismissed!"

          # -----------------------------------------------
          # Screen Mirror - scrcpy သုံးတာ (feh ထက် ကောင်းတယ်)
          # emulator screen ကို Xvfb ပေါ်မှာ fullscreen ပြတာ
          # -----------------------------------------------
          echo "=== 📺 Starting Screen Mirror with scrcpy... ==="

          scrcpy \
            --no-audio \
            --window-x 0 \
            --window-y 0 \
            --window-width 720 \
            --window-height 1280 \
            --window-borderless \
            --stay-awake \
            --turn-screen-off \
            2>/dev/null &

          SCRCPY_PID=$!
          sleep 5

          # scrcpy window ကို fullscreen လုပ်တာ
          wmctrl -r :ACTIVE: -b add,fullscreen 2>/dev/null || true
          sleep 3

          echo "✅ Screen Mirror started! PID: $SCRCPY_PID"

          # scrcpy မအောင်မြင်ရင် feh fallback သုံးတာ
          if ! kill -0 $SCRCPY_PID 2>/dev/null; then
            echo "⚠️ scrcpy failed, using feh fallback..."
            while true; do
              adb exec-out screencap -p > /tmp/frame.png 2>/dev/null
              if [ -s /tmp/frame.png ]; then
                DISPLAY=:99 feh \
                  --fullscreen \
                  --auto-zoom \
                  --geometry 1280x720+0+0 \
                  /tmp/frame.png &
                FEH_PID=$!
                sleep 0.033
                kill $FEH_PID 2>/dev/null
              fi
            done &
            echo "✅ feh fallback mirror started!"
          fi

          sleep 5

          # -----------------------------------------------
          # YouTube Live Stream စတင်တာ
          # ffmpeg နဲ့ Xvfb screen ကို YouTube ကို stream တာ
          # -----------------------------------------------
          echo "=== 🎥 Starting YouTube Live Stream... ==="
          ffmpeg \
            -f x11grab \
            -framerate 30 \
            -video_size 1280x720 \
            -i :99.0+0,0 \
            -f lavfi \
            -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -c:v libx264 \
            -preset ultrafast \
            -tune zerolatency \
            -pix_fmt yuv420p \
            -r 30 \
            -g 60 \
            -b:v 4500k \
            -maxrate 4500k \
            -bufsize 9000k \
            -c:a aac \
            -ar 44100 \
            -b:a 128k \
            -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"

          # Stream ပြီးရင် cleanup
          kill $SCRCPY_PID 2>/dev/null
          echo "✅ Stream ended!"
          SCRIPT
          chmod +x /tmp/stream.sh
          echo "✅ Stream script created!"

      # ===================================================
      # Emulator Run + Stream စတင်တာ
      # ===================================================
      - name: Run Emulator and Stream
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DISPLAY: ':99'
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          # -no-window ထည့်ထားတယ် - emulator window သီးသန့် မပြဘဲ scrcpy ကသာ ပြမယ်
          emulator-options: >-
            -no-audio
            -no-boot-anim
            -no-snapshot
            -gpu swiftshader_indirect
            -memory 4096
            -no-window
          script: bash /tmp/stream.sh

      # ===================================================
      # Error ဖြစ်ရင် log ကြည့်တာ
      # ===================================================
      - name: Show Logs on Failure
        if: failure()
        run: |
          echo "=== Emulator Log ==="
          cat /tmp/emulator.log 2>/dev/null || echo "No emulator log found"
          echo "=== ADB Devices ==="
          adb devices 2>/dev/null || echo "ADB not available"
          echo "=== Display Check ==="
          DISPLAY=:99 xdpyinfo 2>/dev/null | head -20 || echo "Display not available"
