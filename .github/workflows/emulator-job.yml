name: Android Emulator + YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # KVM enable
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Dependencies - Xvfb မလိုတော့ဘူး၊ ffmpeg တစ်ခုတည်းနဲ့ လုပ်မယ်
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          echo "✅ Dependencies installed!"

      # APK Download
      - name: Download APK
        run: |
          wget -q -O /tmp/app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"
          echo "✅ APK size: $(du -sh /tmp/app.apk)"

      # Stream Script
      - name: Create Stream Script
        run: |
          cat > /tmp/stream.sh << 'SCRIPT'
          #!/bin/bash
          echo "=== ✅ Emulator Ready! ==="

          adb root || true
          sleep 3

          # Ad Block
          adb shell settings put global private_dns_mode hostname || true
          adb shell settings put global private_dns_specifier dns.adguard.com || true
          echo "✅ Ads blocked!"

          # APK Install
          adb install -r /tmp/app.apk
          echo "✅ APK Installed!"

          # Screen Unlock
          adb shell input keyevent 82
          sleep 1
          adb shell input keyevent 4
          sleep 1
          adb shell input keyevent 82
          sleep 2
          echo "✅ Screen Unlocked!"

          # App Launch
          echo "=== 🚀 Launching App ==="
          adb shell am start -n "network.kalock.myanmar2d/.MainActivity"
          sleep 15
          echo "✅ App Launched!"

          # Dialog dismiss
          echo "=== 🔧 Dismissing dialog... ==="
          sleep 3
          adb shell input keyevent 66
          sleep 1
          adb shell input tap 512 328
          sleep 2
          echo "✅ Dialog dismissed!"

          # -----------------------------------------------
          # ** အဓိက FIX - Xvfb လုံးဝ မသုံးတော့ဘူး **
          #
          # adb exec-out screencap -p သည် raw PNG bytes တွေကို
          # stdout ကနေ ထုတ်ပေးတယ်
          #
          # ffmpeg သည် pipe ကနေ PNG frame တွေကို တစ်ခုပြီးတစ်ခု
          # ဖတ်ပြီး တိုက်ရိုက် RTMP ကို stream တာ
          #
          # Xvfb, feh, scrcpy, xwud - တစ်ခုမှ မလိုတော့ဘူး!
          # Black screen ပြဿနာ လုံးဝ မဖြစ်တော့ဘူး!
          # -----------------------------------------------
          echo "=== 🎥 Starting Direct Stream (no Xvfb needed)... ==="

          # adb screencap frame တွေကို loop ဆွဲပြီး
          # ffmpeg concat pipe ထဲ ထည့်သွင်းမယ်
          # ffmpeg က image2pipe format နဲ့ ဖတ်မယ်

          # Named pipe ဆောက်တာ
          mkfifo /tmp/videopipe

          # Background မှာ adb screencap loop လုပ်ပြီး pipe ထဲ ထည့်တာ
          (
            while true; do
              adb exec-out screencap -p 2>/dev/null
              # 30fps အတွက် ~33ms စောင့်တာ
              sleep 0.033
            done
          ) > /tmp/videopipe &
          CAPTURE_PID=$!
          echo "✅ Capture loop started! PID: $CAPTURE_PID"

          # ffmpeg က pipe ကနေ PNG frame တွေ ဖတ်ပြီး YouTube ကို stream တာ
          # -re မသုံးဘူး - pipe rate နဲ့ sync လုပ်မယ်
          ffmpeg \
            -f image2pipe \
            -framerate 30 \
            -vcodec png \
            -i /tmp/videopipe \
            -f lavfi \
            -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" \
            -c:v libx264 \
            -preset ultrafast \
            -tune zerolatency \
            -pix_fmt yuv420p \
            -r 30 \
            -g 60 \
            -b:v 4500k \
            -maxrate 4500k \
            -bufsize 9000k \
            -c:a aac \
            -ar 44100 \
            -b:a 128k \
            -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"

          kill $CAPTURE_PID 2>/dev/null
          rm -f /tmp/videopipe
          echo "✅ Stream ended!"
          SCRIPT
          chmod +x /tmp/stream.sh
          echo "✅ Stream script created!"

      # Emulator Run + Stream
      - name: Run Emulator and Stream
        uses: reactivecircus/android-emulator-runner@v2
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          emulator-options: >-
            -no-audio
            -no-boot-anim
            -no-snapshot
            -gpu swiftshader_indirect
            -memory 4096
            -no-window
          script: bash /tmp/stream.sh

      # Error log
      - name: Show Logs on Failure
        if: failure()
        run: |
          echo "=== Emulator Log ==="
          cat /tmp/emulator.log 2>/dev/null || echo "No emulator log"
          echo "=== ADB Devices ==="
          adb devices 2>/dev/null || echo "ADB not available"
