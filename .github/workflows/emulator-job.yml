name: Android Emulator + YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install FFmpeg and Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg xvfb

      - name: Download APK
        run: |
          wget -q -O app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"
          echo "APK size: $(du -sh app.apk)"

      - name: Start Virtual Display
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac &
          sleep 3
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run Emulator, Install APK and Stream to YouTube
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DISPLAY: ':99'
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -memory 4096
          script: |
            export DISPLAY=:99
            echo "=== Emulator Ready! ==="

            adb root || true
            sleep 2
            adb shell settings put global private_dns_mode hostname || true
            adb shell settings put global private_dns_specifier dns.adguard.com || true
            echo "Ads blocked!"

            adb install -r app.apk
            echo "APK Installed!"

            adb shell input keyevent 82
            sleep 2

            adb shell am start -a android.intent.action.MAIN -c android.intent.category.LAUNCHER network.kalock.myanmar2d
            sleep 10
            echo "App Launched!"

            # ── ADB screen မှ Xvfb သို့ mirror လုပ်ခြင်း ──
            adb shell screenrecord --output-format=h264 - | ffmpeg \
              -f h264 \
              -i pipe:0 \
              -f lavfi \
              -i anullsrc=channel_layout=stereo:sample_rate=44100 \
              -vcodec libx264 \
              -preset ultrafast \
              -tune zerolatency \
              -pix_fmt yuv420p \
              -g 60 \
              -b:v 3000k \
              -minrate 3000k \
              -maxrate 3000k \
              -bufsize 6000k \
              -acodec aac \
              -ar 44100 \
              -b:a 128k \
              -f flv \
              "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"

      - name: Show Logs on Failure
        if: failure()
        run: |
          cat /tmp/emulator.log 2>/dev/null || echo "No emulator log"
