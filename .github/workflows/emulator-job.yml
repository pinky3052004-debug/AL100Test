name: Android Emulator + YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3 python3-pip fonts-dejavu-core
          sudo apt-get install -y fonts-noto fonts-noto-cjk || true
          pip3 install Pillow --break-system-packages
          fc-cache -fv || true
          echo "✅ Done!"

      - name: Download APK
        run: |
          wget -q -O /tmp/app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"
          echo "✅ APK: $(du -sh /tmp/app.apk)"

      - name: Create Compositor Script
        run: |
          cat > /tmp/compositor.py << 'PYEOF'
          #!/usr/bin/env python3
          import subprocess, sys, time, threading, io, random, datetime, os, math
          from PIL import Image, ImageDraw, ImageFont

          W, H = 1280, 720
          FPS  = 20
          INTERVAL = 1.0 / FPS

          def mmt_now():
              return datetime.datetime.utcnow() + datetime.timedelta(hours=6, minutes=30)

          now   = mmt_now()
          hour  = now.hour
          date  = now.strftime("%d-%m-%Y")

          DAYS_MY = {
              "Monday":    "တနင်္လာ",
              "Tuesday":   "အင်္ဂါ",
              "Wednesday": "ဗုဒ္ဓဟူး",
              "Thursday":  "ကြာသပတေး",
              "Friday":    "သောကြာ",
              "Saturday":  "စနေ",
              "Sunday":    "တနင်္ဂနွေ",
          }
          day_en = now.strftime("%A")
          day_my = DAYS_MY.get(day_en, day_en)

          if hour < 12:
              SESS_TIME  = "12:01 PM"
              SESS_MY    = "မနက်ပိုင်း"
          else:
              SESS_TIME  = "4:30 PM"
              SESS_MY    = "ညနေပိုင်း"

          def rnd3():
              return f"{random.randint(0,99):02d}-{random.randint(0,99):02d}-{random.randint(0,99):02d}"

          PAT  = rnd3()
          MAIN = rnd3()
          ALT  = rnd3()

          sys.stderr.write(f"[{date}] {SESS_TIME} | PAT={PAT} MAIN={MAIN} ALT={ALT}\n")
          sys.stderr.flush()

          MY_FONT_PATHS = [
              "/usr/share/fonts/truetype/noto/NotoSansMyanmar-Bold.ttf",
              "/usr/share/fonts/truetype/noto/NotoSansMyanmar-Regular.ttf",
              "/usr/share/fonts/opentype/noto/NotoSansMyanmar-Bold.otf",
              "/usr/share/fonts/opentype/noto/NotoSansMyanmar-Regular.otf",
              "/usr/share/fonts/truetype/noto/NotoSerifMyanmar-Bold.ttf",
              "/usr/share/fonts/truetype/noto/NotoSerifMyanmar-Regular.ttf",
          ]
          EN_FONT_PATHS = [
              "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
              "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf",
          ]

          def find_font(paths):
              for p in paths:
                  if os.path.exists(p):
                      return p
              return None

          MY_PATH = find_font(MY_FONT_PATHS)
          EN_PATH = find_font(EN_FONT_PATHS)
          sys.stderr.write(f"Myanmar font: {MY_PATH}\n")
          sys.stderr.write(f"English font: {EN_PATH}\n")
          sys.stderr.flush()

          def load_font(size, myanmar=False):
              path = MY_PATH if (myanmar and MY_PATH) else EN_PATH
              if path:
                  try:
                      return ImageFont.truetype(path, size)
                  except:
                      pass
              return ImageFont.load_default()

          F_CLOCK  = load_font(54)
          F_NUM    = load_font(68)
          F_DATE   = load_font(44)
          F_SESS   = load_font(48)
          F_LABEL  = load_font(30, myanmar=True)
          F_DAY    = load_font(40, myanmar=True)
          F_SUB    = load_font(32)
          F_SUB_SM = load_font(22)
          F_TINY   = load_font(30, myanmar=True)

          YELLOW   = (255, 215,   0)
          RED      = (204,   0,   0)
          DKRED    = (139,   0,   0)
          GREEN    = (  0, 180,  60)
          DKGREEN  = (  0,  90,  30)
          LTGREEN  = (  0, 255,  80)
          PURPLE   = (106,  13, 173)
          DKPURPLE = ( 61,   0, 122)
          BLUE     = ( 21, 101, 192)
          DKBLUE   = ( 13,  59, 122)
          WHITE    = (255, 255, 255)
          BLACK    = ( 17,  17,  17)
          AMBER    = (230,  92,   0)
          DKAMBER  = (139,  69,   0)
          GOLD     = (255, 200,   0)
          CHARCOAL = ( 30,  30,  30)

          def pill(draw, x1, y1, x2, y2, fill, outline=None, r=16, width=3):
              draw.rounded_rectangle([x1,y1,x2,y2], radius=r,
                                     fill=fill, outline=outline,
                                     width=width if outline else 0)

          def text_c(draw, txt, cx, cy, font, color, stroke=0, stroke_color=BLACK):
              bbox = draw.textbbox((0,0), txt, font=font)
              tw = bbox[2]-bbox[0]; th = bbox[3]-bbox[1]
              x = cx - tw//2; y = cy - th//2
              if stroke:
                  draw.text((x,y), txt, font=font,
                            fill=stroke_color, stroke_width=stroke, stroke_fill=stroke_color)
              draw.text((x,y), txt, font=font, fill=color)

          PHONE_X, PHONE_Y = 330, 10
          PHONE_W, PHONE_H = 620, 700

          LX1, LX2 = 73, 407
          LC = (LX1+LX2)//2
          RX1, RX2 = 884, 1211
          RC = (RX1+RX2)//2

          def build_bg():
              img = Image.new("RGB", (W, H), YELLOW)
              d   = ImageDraw.Draw(img)

              for i in range(8):
                  d.rectangle([0, i, W, i+1], fill=(255-i*10, 200-i*5, 0))

              # 1. Session Time Pill (H: 72px, Center Y: 40)
              pill(d, LX1, 10, LX2, 99, RED, outline=DKRED, r=36)
              text_c(d, SESS_TIME, LC, 55, F_SESS, WHITE, stroke=1)
              
              # 2. Empty White Pill (H: 60px)
              pill(d, LX1, 116, LX2, 158.5, WHITE, outline=(180,180,180), r=30)
              
              # 3. Day & Session Myan Pill - BOLD (H: 100px, Center Y: 184)
              pill(d, LX1, 222, LX2, 441, BLUE, outline=DKBLUE, r=50)
              text_c(d, day_my, LC, 272, F_DAY, WHITE, stroke=1)
              text_c(d, SESS_MY, LC, 331, F_TINY, (200,230,255), stroke=0)
              text_c(d, "ထွက်ကြဟန်း", LC, 389, F_LABEL, WHITE, stroke=1)

              pill(d, LX1, 466, LX2, 555, RED, outline=DKRED, r=36)
              text_c(d, Live Now, LC, 510, F_SESS, WHITE, stroke=1)
              
              
              
              # ==================== RIGHT COLUMN (BOLD TUNED) ====================
              
              # 1. Date Pill (H: 64px, Center Y: 40)
              pill(d, RX1, 10, RX2, 99, RED, outline=DKRED, r=32)
              text_c(d, date, RC, 55, F_DATE, WHITE, stroke=1)
              
              # 2. ပတ်သီး Pill - BOLD (H: 64px, Center Y: 105)
              pill(d, RX1, 117, RX2, 206, DKRED, outline=RED, r=32)
              text_c(d, f"ပတ်သီး  {PAT}", RC, 162, F_TINY, GOLD, stroke=1)
              
              # 3. မိန်း Label Pill - BOLD (H: 64px, Center Y: 166)
              pill(d, 892, 223, 1029, 292, PURPLE, outline=DKPURPLE, r=32)
              text_c(d, "မိန်း", RX1+73, 258, F_LABEL, WHITE, stroke=1)
              
              # 4. MAIN Number Pill (H: 92px, Center Y: 246)
              pill(d, RX1, 282, RX2, 382, DKGREEN, outline=GREEN, r=46, width=3)
              text_c(d, MAIN, RC, 332, F_NUM, LTGREEN, stroke=2, stroke_color=(0,40,10))
              
              # 5. အရံ Label Pill - BOLD (H: 64px, Center Y: 328)
              pill(d, 892, 296, 1029, 360, PURPLE, outline=DKPURPLE, r=32)
              text_c(d, "အရံ", RX1+73, 960, F_LABEL, WHITE, stroke=1)
              
              # 6. ALT Number Pill (H: 92px, Center Y: 410)
              pill(d, RX1, 460, RX2, 560, DKGREEN, outline=GREEN, r=46, width=3)
              text_c(d, ALT, RC, 510, F_NUM, LTGREEN, stroke=2, stroke_color=(0,40,10))
              
              
              # Bottom Bars
              d.rectangle([0, H-6, W, H], fill=RED)
              d.rectangle([0, H-12, W, H-6], fill=GOLD)
              return img

          BG = build_bg()

          last_screen = None
          lock = threading.Lock()
          running = True

          def grab():
              global last_screen, running
              while running:
                  try:
                      r = subprocess.run(
                          ["adb","exec-out","screencap","-p"],
                          capture_output=True, timeout=15)
                      if r.returncode == 0 and len(r.stdout) > 1000:
                          with lock:
                              last_screen = r.stdout
                  except Exception as e:
                      sys.stderr.write(f"grab err: {e}\n")
                  time.sleep(0.5)

          threading.Thread(target=grab, daemon=True).start()

          sys.stderr.write("Waiting for screen...\n"); sys.stderr.flush()
          for _ in range(120):
              with lock:
                  if last_screen: break
              time.sleep(0.5)

          if not last_screen:
              sys.stderr.write("No screen!\n"); sys.stderr.flush(); sys.exit(1)

          sys.stderr.write("Compositing started!\n"); sys.stderr.flush()

          SUB_TEXTS = [
              "Subscribe လုပ်ပြီး Bell နှိပ်ပါ!",
              "Like နှင့် Share လုပ်ပေးပါ!",
              "LIVE ကြည့်ပေးတဲ့အတွက် ကျေးဇူးတင်ပါ",
              "Notification Bell နှိပ်ပါ!",
          ]
          sub_idx  = 0
          sub_tick = 0
          SUB_CYCLE = FPS * 4

          out = sys.stdout.buffer
          frame_n = 0

          try:
              while True:
                  t0 = time.time()
                  frame_n += 1
                  sub_tick += 1
                  if sub_tick >= SUB_CYCLE:
                      sub_tick = 0
                      sub_idx = (sub_idx + 1) % len(SUB_TEXTS)

                  frame = BG.copy()
                  d2 = ImageDraw.Draw(frame)

                  # clock
                  t = mmt_now()
                  clock_str = t.strftime("%H:%M:%S")
                  pill(d2, LX1, 78, LX2, 138, WHITE, outline=(180,180,180), r=12)
                  text_c(d2, clock_str, LC, 108, F_CLOCK, BLACK)

                  # phone screen
                  with lock: raw = last_screen
                  try:
                      phone_img = Image.open(io.BytesIO(raw)).convert("RGB")
                      phone_img.thumbnail((PHONE_W, PHONE_H), Image.LANCZOS)
                      pw, ph = phone_img.size
                      frame_x1 = PHONE_X + (PHONE_W - pw) // 2
                      frame_y1 = PHONE_Y + (PHONE_H - ph) // 2
                      frame_x2 = frame_x1 + pw
                      frame_y2 = frame_y1 + ph
                  
                      d2.rounded_rectangle(
                          [frame_x1-6, frame_y1-6, frame_x2+6, frame_y2+6],
                          radius=24, fill=BLACK, outline=GOLD, width=3)
                      frame.paste(phone_img, (frame_x1, frame_y1))
                  except Exception as e:
                      sys.stderr.write(f"paste err: {e}\n")

                  # subscribe bar
                  pulse = 0.7 + 0.3 * math.sin(frame_n * 0.15)
                  r_c = int(220 * pulse)
                  g_c = int(40  * pulse)
                  b_c = int(40  * pulse)
                  pill(d2, 8, 520, W-8, 590, (r_c,g_c,b_c), outline=(255,80,80), r=20, width=3)

                  bell_r = int(18 + 4 * math.sin(frame_n * 0.2))
                  bx, by = 55, 555
                  d2.ellipse([bx-bell_r, by-bell_r, bx+bell_r, by+bell_r],
                             fill=GOLD, outline=WHITE)

                  sub_text = SUB_TEXTS[sub_idx]
                  alpha_f = min(1.0, sub_tick / 10)
                  txt_color = (int(255*alpha_f), int(255*alpha_f), int(255*alpha_f))
                  text_c(d2, sub_text, W//2 + 20, 555, F_SUB, txt_color, stroke=2)

                  pill(d2, W-210, 530, W-18, 582, WHITE, outline=RED, r=16, width=3)
                  text_c(d2, "SUBSCRIBE", W-114, 556, F_SUB_SM, RED)

                  pill(d2, RX1, 470, RX2, 510, CHARCOAL, outline=GOLD, r=10, width=2)
                  text_c(d2, "LIVE NOW", RC, 490, F_SUB_SM, WHITE)

                  out.write(frame.tobytes())
                  out.flush()

                  if frame_n % 100 == 0:
                      sys.stderr.write(f"frames={frame_n} t={clock_str}\n")
                      sys.stderr.flush()

                  dt = INTERVAL - (time.time() - t0)
                  if dt > 0: time.sleep(dt)

          except BrokenPipeError:
              sys.stderr.write("Done.\n")
          finally:
              running = False
          PYEOF
          chmod +x /tmp/compositor.py
          echo "✅ Compositor ready!"

      - name: Create Stream Script
        run: |
          cat > /tmp/stream.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          echo "=== Emulator Ready ==="

          adb root || true
          sleep 5

          adb shell settings put global private_dns_mode hostname   || true
          adb shell settings put global private_dns_specifier dns.adguard.com || true

          adb install -r /tmp/app.apk
          echo "APK installed"

          adb shell input keyevent 82; sleep 1
          adb shell input keyevent 4;  sleep 1
          adb shell input keyevent 82; sleep 2

          adb shell am start -n "network.kalock.myanmar2d/.MainActivity"
          sleep 20

          sleep 3
          adb shell input keyevent 66; sleep 1
          adb shell input tap 512 328; sleep 2
          adb shell input keyevent 66; sleep 1
          echo "Dialog dismissed"

          echo "=== Starting stream ==="

          python3 /tmp/compositor.py 2>/tmp/comp.log | \
          ffmpeg \
            -re \
            -f rawvideo \
            -pixel_format rgb24 \
            -video_size 1280x720 \
            -framerate 20 \
            -i pipe:0 \
            -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -c:v libx264 \
            -preset ultrafast \
            -tune zerolatency \
            -pix_fmt yuv420p \
            -r 20 \
            -g 40 \
            -b:v 2500k \
            -maxrate 3000k \
            -bufsize 6000k \
            -c:a aac \
            -ar 44100 \
            -b:a 128k \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"

          cat /tmp/comp.log
          echo "Stream ended!"
          SCRIPT
          chmod +x /tmp/stream.sh

      - name: Run Emulator and Stream
        uses: reactivecircus/android-emulator-runner@v2
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: >-
            -no-audio -no-boot-anim -no-snapshot
            -gpu swiftshader_indirect -memory 4096 -no-window
          script: bash /tmp/stream.sh

      - name: Logs on Failure
        if: failure()
        run: |
          echo "=== Compositor Log ==="
          cat /tmp/comp.log 2>/dev/null || echo "no compositor log"
          echo "=== Emulator Log ==="
          cat /tmp/emulator.log 2>/dev/null || echo "no emulator log"
