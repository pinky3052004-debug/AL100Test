name: Android Emulator + YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3
          echo "✅ Dependencies installed!"

      - name: Download APK
        run: |
          wget -q -O /tmp/app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"
          echo "✅ APK size: $(du -sh /tmp/app.apk)"

      # -----------------------------------------------
      # Python bridge script ဆောက်တာ
      # ဒီ script သည်:
      # 1. adb screencap ကို loop ဆွဲပြီး PNG bytes ရယူတယ်
      # 2. PNG တစ်ကြိမ်ပြီးတိုင်း ffmpeg stdin ထဲ တိုက်ရိုက် ထည့်တယ်
      # 3. adb နှေးရင် နောက်ဆုံး frame ကို ထပ်ပို့တာကြောင့် fps smooth
      # 4. ffmpeg က မည်သည့်အချိန်မဆို stream ကို ဆက်ရနေမယ်
      # -----------------------------------------------
      - name: Create Python Bridge Script
        run: |
          cat > /tmp/capture.py << 'PYEOF'
          #!/usr/bin/env python3
          import subprocess
          import sys
          import time
          import threading

          TARGET_FPS = 30
          FRAME_INTERVAL = 1.0 / TARGET_FPS  # 0.033s

          last_frame = None
          frame_lock = threading.Lock()
          running = True

          def capture_loop():
              """Background thread: adb screencap ဆွဲနေတာ"""
              global last_frame, running
              while running:
                  try:
                      result = subprocess.run(
                          ['adb', 'exec-out', 'screencap', '-p'],
                          capture_output=True,
                          timeout=10
                      )
                      if result.returncode == 0 and len(result.stdout) > 1000:
                          with frame_lock:
                              last_frame = result.stdout
                  except Exception as e:
                      sys.stderr.write(f"Capture error: {e}\n")
                      time.sleep(0.5)

          # Background thread စတင်
          t = threading.Thread(target=capture_loop, daemon=True)
          t.start()

          # ပထမ frame ရောက်အောင် စောင့်
          sys.stderr.write("Waiting for first frame...\n")
          for _ in range(60):
              with frame_lock:
                  if last_frame:
                      break
              time.sleep(0.5)

          if not last_frame:
              sys.stderr.write("ERROR: No frame received!\n")
              sys.exit(1)

          sys.stderr.write("✅ Streaming started!\n")

          # stdout ကို ffmpeg stdin ထဲ pipe လုပ်မယ်
          # 30fps နှုန်းနဲ့ frame တွေ ပို့တာ
          # adb နှေးရင် နောက်ဆုံး frame ထပ်ပို့
          frame_count = 0
          out = sys.stdout.buffer
          try:
              while True:
                  start = time.time()
                  with frame_lock:
                      frame = last_frame
                  if frame:
                      out.write(frame)
                      out.flush()
                      frame_count += 1
                      if frame_count % 150 == 0:  # 5 sec တိုင်း log
                          sys.stderr.write(f"📸 Frames sent: {frame_count}\n")
                  elapsed = time.time() - start
                  sleep_time = FRAME_INTERVAL - elapsed
                  if sleep_time > 0:
                      time.sleep(sleep_time)
          except BrokenPipeError:
              sys.stderr.write("ffmpeg pipe closed.\n")
          finally:
              running = False
          PYEOF
          chmod +x /tmp/capture.py
          echo "✅ Python bridge created!"

      - name: Create Stream Script
        run: |
          cat > /tmp/stream.sh << 'SCRIPT'
          #!/bin/bash
          echo "=== ✅ Emulator Ready! ==="

          adb root || true
          sleep 3

          # Ad Block
          adb shell settings put global private_dns_mode hostname || true
          adb shell settings put global private_dns_specifier dns.adguard.com || true
          echo "✅ Ads blocked!"

          # APK Install
          adb install -r /tmp/app.apk
          echo "✅ APK Installed!"

          # Screen Unlock
          adb shell input keyevent 82
          sleep 1
          adb shell input keyevent 4
          sleep 1
          adb shell input keyevent 82
          sleep 2
          echo "✅ Screen Unlocked!"

          # App Launch
          echo "=== 🚀 Launching App ==="
          adb shell am start -n "network.kalock.myanmar2d/.MainActivity"
          sleep 15
          echo "✅ App Launched!"

          # Dialog dismiss
          sleep 3
          adb shell input keyevent 66
          sleep 1
          adb shell input tap 512 328
          sleep 2
          adb shell input keyevent 66
          sleep 1
          echo "✅ Dialog dismissed!"

          echo "=== 🎥 Starting Stream via Python bridge ==="

          # Python capture → ffmpeg stdin pipe
          # python3 /tmp/capture.py  : 30fps নিয়মিত PNG frames → stdout
          # ffmpeg -i pipe:0          : stdin কেকে video source হিসেবে পড়ে
          python3 /tmp/capture.py 2>/tmp/capture.log | \
          ffmpeg \
            -re \
            -f image2pipe \
            -framerate 30 \
            -vcodec png \
            -i pipe:0 \
            -f lavfi \
            -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" \
            -c:v libx264 \
            -preset veryfast \
            -tune zerolatency \
            -pix_fmt yuv420p \
            -r 30 \
            -g 60 \
            -b:v 3000k \
            -maxrate 3500k \
            -bufsize 14000k \
            -c:a aac \
            -ar 44100 \
            -b:a 128k \
            -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"

          echo "=== Capture Log ==="
          cat /tmp/capture.log
          echo "✅ Stream ended!"
          SCRIPT
          chmod +x /tmp/stream.sh
          echo "✅ Stream script created!"

      - name: Run Emulator and Stream
        uses: reactivecircus/android-emulator-runner@v2
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          emulator-options: >-
            -no-audio
            -no-boot-anim
            -no-snapshot
            -gpu swiftshader_indirect
            -memory 4096
            -no-window
          script: bash /tmp/stream.sh

      - name: Show Logs on Failure
        if: failure()
        run: |
          echo "=== Capture Log ==="
          cat /tmp/capture.log 2>/dev/null || echo "No capture log"
          echo "=== Emulator Log ==="
          cat /tmp/emulator.log 2>/dev/null || echo "No emulator log"
