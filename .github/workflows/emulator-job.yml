name: Android Emulator + YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # KVM enable
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Dependencies install
      # feh မလိုတော့ဘူး - ffmpeg တစ်ခုတည်းနဲ့ လုပ်မယ်
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            x11-utils \
            xdotool \
            x11vnc \
            imagemagick
          echo "✅ Dependencies installed!"

      # APK Download
      - name: Download APK
        run: |
          wget -q -O /tmp/app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"
          echo "✅ APK size: $(du -sh /tmp/app.apk)"

      # Virtual Display start
      - name: Start Virtual Display
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
          sleep 5
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Xvfb started!"

      # Stream Script ဆောက်တာ
      - name: Create Stream Script
        run: |
          cat > /tmp/stream.sh << 'SCRIPT'
          #!/bin/bash
          export DISPLAY=:99
          echo "=== ✅ Emulator Ready! ==="

          adb root || true
          sleep 3

          # Ad Block
          adb shell settings put global private_dns_mode hostname || true
          adb shell settings put global private_dns_specifier dns.adguard.com || true
          echo "✅ Ads blocked!"

          # APK Install
          adb install -r /tmp/app.apk
          echo "✅ APK Installed!"

          # Screen Unlock
          adb shell input keyevent 82
          sleep 1
          adb shell input keyevent 4
          sleep 1
          adb shell input keyevent 82
          sleep 2
          echo "✅ Screen Unlocked!"

          # App Launch
          echo "=== 🚀 Launching App ==="
          adb shell am start -n "network.kalock.myanmar2d/.MainActivity"
          sleep 15
          echo "✅ App Launched!"

          # -----------------------------------------------
          # Dialog dismiss - Nested Virtualization Warning
          # -----------------------------------------------
          echo "=== 🔧 Dismissing dialog... ==="
          sleep 3
          adb shell input keyevent 66
          sleep 1
          adb shell input tap 512 328
          sleep 2
          adb shell input keyevent 66
          sleep 1
          echo "✅ Dialog dismissed!"

          # -----------------------------------------------
          # ** အဓိက FIX **
          # feh / scrcpy မသုံးတော့ဘူး
          # adb screencap -> pipe -> ffmpeg -> Xvfb ထဲ ဆွဲသွင်းတာ
          # race condition ပြဿနာ လုံးဝ မဖြစ်တော့ဘူး
          # -----------------------------------------------
          echo "=== 📺 Starting screen mirror via ffmpeg pipe... ==="

          # Xvfb ထဲကို background မှာ frame တွေ ဆက်တိုက် ထည့်သွင်းမယ်
          # atomic write သုံးတာ - tmp file ရေးပြီးမှ rename လုပ်တာ
          # ဒါဆို feh/ffmpeg က incomplete file ကို မဖတ်တော့ဘူး
          (
            while true; do
              # atomic write: .tmp ကို ရေးပြီး rename လုပ်တာ
              adb exec-out screencap -p > /tmp/frame.tmp 2>/dev/null
              if [ -s /tmp/frame.tmp ]; then
                mv -f /tmp/frame.tmp /tmp/frame.png

                # convert (ImageMagick) သုံးပြီး Xvfb root window မှာ background set လုပ်တာ
                # feh မလိုဘူး၊ race condition မဖြစ်ဘူး
                DISPLAY=:99 convert /tmp/frame.png \
                  -resize 1280x720! \
                  -depth 8 \
                  bgr:- 2>/dev/null | \
                DISPLAY=:99 xwud -raw -geometry 1280x720+0+0 2>/dev/null &
                XWUD_PID=$!
                sleep 0.04
                kill $XWUD_PID 2>/dev/null
              fi
              sleep 0.016
            done
          ) &
          MIRROR_PID=$!
          echo "✅ Mirror started! PID: $MIRROR_PID"
          sleep 8

          # -----------------------------------------------
          # YouTube Live Stream
          # -----------------------------------------------
          echo "=== 🎥 Starting YouTube Stream ==="
          ffmpeg \
            -f x11grab \
            -framerate 30 \
            -video_size 1280x720 \
            -i :99.0+0,0 \
            -f lavfi \
            -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -c:v libx264 \
            -preset ultrafast \
            -tune zerolatency \
            -pix_fmt yuv420p \
            -r 30 \
            -g 60 \
            -b:v 4500k \
            -maxrate 4500k \
            -bufsize 9000k \
            -c:a aac \
            -ar 44100 \
            -b:a 128k \
            -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"

          kill $MIRROR_PID 2>/dev/null
          echo "✅ Stream ended!"
          SCRIPT
          chmod +x /tmp/stream.sh
          echo "✅ Stream script created!"

      # Emulator Run + Stream
      - name: Run Emulator and Stream
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DISPLAY: ':99'
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          emulator-options: >-
            -no-audio
            -no-boot-anim
            -no-snapshot
            -gpu swiftshader_indirect
            -memory 4096
            -no-window
          script: bash /tmp/stream.sh

      # Error log
      - name: Show Logs on Failure
        if: failure()
        run: |
          echo "=== Emulator Log ==="
          cat /tmp/emulator.log 2>/dev/null || echo "No emulator log"
          echo "=== ADB Devices ==="
          adb devices 2>/dev/null || echo "ADB not available"
          echo "=== Display Check ==="
          DISPLAY=:99 xdpyinfo 2>/dev/null | head -20 || echo "Display not available"
