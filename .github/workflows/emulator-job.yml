name: Emulator Job

on:
  workflow_call:
    inputs:
      job_number:
        required: true
        type: number
    secrets:
      YOUTUBE_STREAM_KEY:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # ── KVM Hardware Acceleration ──
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── FFmpeg + Xvfb ──
      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg xvfb

      # ── Java ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── APK Download ──
      - name: Download APK
        run: |
          wget -q -O app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"

      # ── Virtual Display ──
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      # ── Emulator (API 28 = အမြန်ဆုံး) ──
      # reactivecircus action က boot ပြီးမှ script run ပေးသည်
      - name: Run Emulator + Install APK + Stream
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DISPLAY: ':99'
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          JOB_NUM: ${{ inputs.job_number }}
        with:
          api-level: 28          # ← API 28 = boot ~3 မိနစ်သာ
          target: default        # ← google_apis မဟုတ်ဘဲ default = မြန်
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          emulator-options: >
            -no-window
            -no-audio
            -no-boot-anim
            -no-snapshot
            -gpu swiftshader_indirect
            -memory 4096
          script: |
            echo "=== Job $JOB_NUM: Emulator Ready! ==="

            # ── Ad Block DNS ──
            adb root || true
            adb shell settings put global private_dns_mode hostname || true
            adb shell settings put global private_dns_specifier dns.adguard.com || true

            # ── APK Install ──
            adb install -r app.apk
            echo "APK Installed!"

            # ── App Launch ──
            adb shell monkey -p network.kalock.myanmar2d \
              -c android.intent.category.LAUNCHER 1
            sleep 5

            # ── Unlock Screen ──
            adb shell input keyevent 82
            adb shell input keyevent 4
            sleep 3

            # ── YouTube Live Stream ──
            echo "Starting stream for Job $JOB_NUM..."
            ffmpeg \
              -f x11grab \
              -r 30 \
              -s 1280x720 \
              -i :99 \
              -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
              -vcodec libx264 \
              -preset ultrafast \
              -tune zerolatency \
              -pix_fmt yuv420p \
              -g 60 \
              -b:v 2500k \
              -maxrate 2500k \
              -bufsize 5000k \
              -acodec aac \
              -ar 44100 \
              -b:a 128k \
              -f flv \
              "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY" \
              2>/tmp/ffmpeg_job$JOB_NUM.log || true
