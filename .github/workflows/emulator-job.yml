name: Android Emulator + YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg bc
          echo "✅ Dependencies installed!"

      - name: Download APK
        run: |
          wget -q -O /tmp/app.apk "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/my_app.apk"
          echo "✅ APK size: $(du -sh /tmp/app.apk)"

      - name: Create Stream Script
        run: |
          cat > /tmp/stream.sh << 'SCRIPT'
          #!/bin/bash
          echo "=== ✅ Emulator Ready! ==="

          adb root || true
          sleep 3

          # Ad Block
          adb shell settings put global private_dns_mode hostname || true
          adb shell settings put global private_dns_specifier dns.adguard.com || true
          echo "✅ Ads blocked!"

          # APK Install
          adb install -r /tmp/app.apk
          echo "✅ APK Installed!"

          # Screen Unlock
          adb shell input keyevent 82
          sleep 1
          adb shell input keyevent 4
          sleep 1
          adb shell input keyevent 82
          sleep 2
          echo "✅ Screen Unlocked!"

          # App Launch
          echo "=== 🚀 Launching App ==="
          adb shell am start -n "network.kalock.myanmar2d/.MainActivity"
          sleep 15
          echo "✅ App Launched!"

          # Dialog dismiss
          sleep 3
          adb shell input keyevent 66
          sleep 1
          adb shell input tap 512 328
          sleep 2
          adb shell input keyevent 66
          sleep 1
          echo "✅ Dialog dismissed!"

          # -----------------------------------------------
          # ** V4 အဓိက FIX - Frame Rate ပြဿနာ ဖြေရှင်းချက် **
          #
          # adb screencap နှေးတာကြောင့် "Poor" signal ဖြစ်တာ
          # ဖြေရှင်းနည်း:
          # 1. adb screencap loop ကို background မှာ မြန်သလောက် run
          # 2. /tmp/latest.png မှာ နောက်ဆုံး frame ကို သိမ်းထား
          # 3. ffmpeg က /tmp/latest.png ကို 30fps နှုန်းနဲ့ ဖတ်ပြီး stream
          #    (frame အသစ်မရောက်သေးရင် ဟောင်းတာကိုပဲ ထပ်သုံးတာ)
          #    => YouTube မှာ smooth, Poor မဖြစ်တော့ဘူး
          # -----------------------------------------------

          echo "=== 📸 Starting background frame capture ==="

          # Capture loop - မြန်သလောက် screencap ဆွဲတာ
          # atomic write - .tmp ရေးပြီး rename မှ ffmpeg ဖတ်တာ
          (
            while true; do
              adb exec-out screencap -p > /tmp/latest.tmp 2>/dev/null
              if [ -s /tmp/latest.tmp ]; then
                mv -f /tmp/latest.tmp /tmp/latest.png
              fi
            done
          ) &
          CAPTURE_PID=$!
          echo "✅ Capture loop started! PID: $CAPTURE_PID"

          # ffmpeg စခင် frame အနည်းဆုံး ၁ ခု ရောက်အောင် စောင့်
          echo "Waiting for first frame..."
          for i in $(seq 1 30); do
            if [ -s /tmp/latest.png ]; then
              echo "✅ First frame received!"
              break
            fi
            sleep 1
          done

          # -----------------------------------------------
          # ffmpeg - loop input mode သုံးတာ
          # -stream_loop -1  : /tmp/latest.png ကို အဆက်မပြတ် loop ဖတ်တာ
          # -r 30            : 30fps နှုန်းနဲ့ output
          # -re              : realtime နှုန်းနဲ့ ထုတ်တာ
          # frame အသစ်ရောက်ရင် mv က file replace လုပ်တာကြောင့်
          # ffmpeg က next loop မှာ အသစ်ကို ဖတ်မယ်
          # -----------------------------------------------
          echo "=== 🎥 Starting YouTube Stream ==="
          ffmpeg \
            -re \
            -stream_loop -1 \
            -framerate 30 \
            -i /tmp/latest.png \
            -f lavfi \
            -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,fps=30" \
            -c:v libx264 \
            -preset veryfast \
            -tune zerolatency \
            -pix_fmt yuv420p \
            -r 30 \
            -g 60 \
            -b:v 3000k \
            -maxrate 3500k \
            -bufsize 7000k \
            -c:a aac \
            -ar 44100 \
            -b:a 128k \
            -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"

          kill $CAPTURE_PID 2>/dev/null
          echo "✅ Stream ended!"
          SCRIPT
          chmod +x /tmp/stream.sh
          echo "✅ Stream script created!"

      - name: Run Emulator and Stream
        uses: reactivecircus/android-emulator-runner@v2
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 2
          force-avd-creation: true
          disable-animations: true
          emulator-options: >-
            -no-audio
            -no-boot-anim
            -no-snapshot
            -gpu swiftshader_indirect
            -memory 4096
            -no-window
          script: bash /tmp/stream.sh

      - name: Show Logs on Failure
        if: failure()
        run: |
          echo "=== Emulator Log ==="
          cat /tmp/emulator.log 2>/dev/null || echo "No emulator log"
          echo "=== ADB Devices ==="
          adb devices 2>/dev/null || echo "ADB not available"
