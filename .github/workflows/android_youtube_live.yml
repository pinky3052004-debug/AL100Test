name: Full Android Emulator & YouTube Live Stream (Final Fixed)

on:
  workflow_dispatch:

jobs:
  live_stream:
    runs-on: macos-15-intel

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install FFmpeg & Scrcpy
        run: |
          brew update
          brew install ffmpeg scrcpy

      # သင့်ရဲ့ GitHub Release (v1.0.0) ထဲမှ my_app.apk ကို တိုက်ရိုက်ဒေါင်းလုဒ်ဆွဲခြင်း
      - name: Download APK from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GitHub Release ထဲမှ my_app.apk အား ဒေါင်းလုဒ်ဆွဲနေသည်..."
          gh release download v1.0.0 --repo "pinky3052004-debug/AL100Test" --pattern "my_app.apk" --clobber
          mv my_app.apk target_app.apk
          echo "ဒေါင်းလုဒ် အောင်မြင်ပါပြီ။"

      - name: Setup and Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29          # Android 10 (ပေါ့ပါး တည်ငြိမ်သည်)
          target: google_apis    
          arch: x86_64           
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none -memory 3072 -cores 2
          disable-animations: true
          
          script: |
            echo "==== Emulator စတင်တက်လာပါပြီ ===="
            # ၁။ Device အခြေခံပွင့်လာသည်နှင့် APK ကို ကြိုသွင်းခြင်း (Broken pipe ကာကွယ်ရန်)
            adb wait-for-device
            echo "App အား Emulator နောက်ကွယ်မှ ကြိုတင်ထည့်သွင်းနေပါသည်..."
            adb install -r target_app.apk
            
            # ၂။ သွင်းပြီးမှ စနစ်တစ်ခုလုံး လုံးဝပြီးပြည့်စုံအောင် တက်လာသည်အထိ စောင့်ခြင်း
            echo "Emulator Package Manager နှင့် Core Services များ အပြီးသတ်ပွင့်လာသည်အထိ စောင့်ဆိုင်းနေပါသည်..."
            while [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" != "1" ]; do echo "Emulator Boot တက်ရန် စောင့်ဆိုင်းနေဆဲဖြစ်ပါသည်..."; sleep 5; done
            
            echo "==== Emulator ၏ စနစ်တစ်ခုလုံး အပြီးသတ်ပွင့်သွားပါပြီ ===="
            echo "စနစ်များ တည်ငြိမ်ပြီး အလုပ်လုပ်နိုင်ရန် စက္ကန့် ၂၀ ထပ်မံစောင့်ဆိုင်းနေပါသည်..."
            sleep 20
            
            # ၃။ App ကို လှမ်းဖွင့်ခြင်း
            echo "App အား စတင်ဖွင့်လှစ်နေပါသည်: network.kalock.myanmar2d"
            adb shell monkey -p network.kalock.myanmar2d -c android.intent.category.LAUNCHER 1
            sleep 5

            # ၄။ YouTube သို့ Live Stream လွှင့်ခြင်း
            echo "==== YouTube သို့ မပြတ်တောက်သော Live Stream စတင်လွှင့်နေပါပြီ ===="
            export SDL_VIDEODRIVER=dummy
            
            # 🚀 🚀 🚀 ပြင်ဆင်ချက်- scrcpy တွင် --record-format=mkv ထည့်သွင်းပြီး ffmpeg ဘက်မှ format အမှားမတက်အောင် ဖြေရှင်းထားသည်
            scrcpy --no-audio --no-window --max-size=1280 --video-bit-rate=2M --video-codec=h264 --record=- --record-format=mkv | ffmpeg -re -i - -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 -c:v copy -c:a aac -b:a 128k -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
