name: Automated Scheduled Live Stream (Anti-Broken-Pipe)

on:
  workflow_dispatch:

jobs:
  live_stream:
    runs-on: macos-15-intel

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install FFmpeg & Scrcpy
        run: |
          brew update
          brew install ffmpeg scrcpy

      - name: Download APK from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GitHub Release ထဲမှ my_app.apk အား ဒေါင်းလုဒ်ဆွဲနေသည်..."
          gh release download v1.0.0 --repo "pinky3052004-debug/AL100Test" --pattern "my_app.apk" --clobber
          mv my_app.apk target_app.apk
          echo "ဒေါင်းလုဒ် အောင်မြင်ပါပြီ။"

      - name: Setup and Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29          
          target: google_apis    
          arch: x86_64           
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none -memory 3072 -cores 2
          disable-animations: true
          script-timeout-minutes: 120
          
          script: |
            echo "==== Emulator စတင်တက်လာပါပြီ ===="
            adb wait-for-device
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၁] - Emulator Core System အပြီးသတ် Boot တက်သည်အထိ အရင်စောင့်ခြင်း
            echo "Emulator Core Services များ အပြီးသတ်ပွင့်လာသည်အထိ စောင့်ဆိုင်းနေပါသည်..."
            while [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" != "1" ]; do 
              echo "Emulator Boot တက်ရန် စောင့်ဆိုင်းနေဆဲဖြစ်ပါသည် (၅ စက္ကန့် ထပ်စောင့်ပါမည်)..."
              sleep 15
            done
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၂] - Package Manager (pm) တကယ် အလုပ်လုပ်မလုပ် ထပ်မံစစ်ဆေးခြင်း
            echo "Package Manager Service အဆင်သင့်ဖြစ်မဖြစ် စစ်ဆေးနေပါသည်..."
            while ! adb shell pm path android >/dev/null 2>&1; do
              echo "Package Manager အဆင်သင့်မဖြစ်သေးပါ။ စက္ကန့်အနည်းငယ် ထပ်မံစောင့်ဆိုင်းပါမည်..."
              sleep 5
            done
            
            echo "==== Emulator ၏ စနစ်တစ်ခုလုံးနှင့် Package Manager အပြီးသတ်ပွင့်သွားပါပြီ ===="
            echo "စနစ်လုံးဝ အနည်ထိုင်သွားစေရန် စက္ကန့် ၃၀ ထပ်မံစောင့်ဆိုင်းပါမည်..."
            sleep 30
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၃] - အားလုံးစိတ်ချရပြီဆိုမှ APK သွင်းခြင်း
            echo "App အား Emulator အတွင်းသို့ စတင်ထည့်သွင်းနေပါသည်..."
            adb install -r target_app.apk
            sleep 15
            
            # ၄။ App ကို လှမ်းဖွင့်ခြင်း
            echo "App အား စတင်ဖွင့်လှစ်နေပါသည်: network.kalock.myanmar2d"
            adb shell monkey -p network.kalock.myanmar2d -c android.intent.category.LAUNCHER 1
            sleep 15

            echo "==== YouTube သို့ မပြတ်တောက်သော Live Stream စတင်လွှင့်နေပါပြီ ===="
            export SDL_VIDEODRIVER=dummy
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၄] - Broken Pipe မဖြစ်စေရန်နှင့် Stream လုံးဝတည်ငြိမ်စေရန် ပြင်ဆင်ထားသော ပိုက်လိုင်း
            # ၁။ --record-format ကို ဖျောက်ပြီး raw H.264 video stream ကိုပဲ ပို့ပေးသည်။
            # ၂။ ffmpeg packet buffer ကို 1024 အထိ မြှင့်တင်ပြီး GitHub Actions Runner ရဲ့ CPU ကြောင့် လိုင်းမပြတ်အောင် ကာကွယ်သည်။
            # ၃။ real-time flag (-re) ကို ဖယ်ရှားပြီး အလိုအလျောက် scale ညှိပေးမည့် video filter ကို သုံးထားသည်။
            
            scrcpy --no-audio --no-window --max-size=1280 --video-bit-rate=2M --video-codec=h264 --push-target=none --record=- | \
            ffmpeg -thread_queue_size 1024 -i - \
            -f lavfi -thread_queue_size 1024 -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -c:v libx264 -preset veryfast -tune zerolatency -g 60 \
            -vf "scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2,format=yuv420p" \
            -b:v 2M -maxrate 2M -bufsize 4M \
            -c:a aac -b:a 128k \
            -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
