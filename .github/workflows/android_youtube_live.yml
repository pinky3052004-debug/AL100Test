name: Full Android Emulator & YouTube Live Stream (AL100Test Auto-Detect)

on:
  workflow_dispatch: # Actions Tab ထဲကနေ 'Run workflow' နှိပ်ပြီး မောင်းရန်

jobs:
  live_stream:
    runs-on: macos-15-intel # တည်ငြိမ်ပြီး အမြန်ဆုံး Intel Mac Runner

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install FFmpeg
        run: |
          brew update
          brew install ffmpeg

      # သင့်ရဲ့ GitHub Release (v1.0.0) ထဲမှ my_app.apk ကို တိုက်ရိုက်ဒေါင်းလုဒ်ဆွဲခြင်း
      - name: Download APK from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GitHub Release ထဲမှ my_app.apk အား ဒေါင်းလုဒ်ဆွဲနေသည်..."
          gh release download v1.0.0 --repo "pinky3052004-debug/AL100Test" --pattern "my_app.apk" --clobber
          
          mv my_app.apk target_app.apk
          echo "ဒေါင်းလုဒ် အောင်မြင်ပါပြီ။"

      - name: Setup and Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31          # Android 12
          target: google_apis    
          arch: x86_64           
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          
          script: |
            echo "==== Emulator စတင်တက်လာပါပြီ ===="
            
            adb wait-for-device
            echo "Android Emulator အဆင်သင့်ဖြစ်ပါပြီ။"
            
            # ဒေါင်းလုဒ်လုပ်ထားသော သင့် APK ကို သွင်းခြင်း
            echo "App အား Emulator ထဲသို့ ထည့်သွင်းနေပါသည်..."
            adb install target_app.apk
            
            # --- 🚀 Package Name ကို APK ထဲကနေ အလိုအလျောက် ရှာဖွေခြင်း ---
            echo "App ၏ Package Name အား ရှာဖွေနေပါသည်..."
            PACKAGE_NAME=$($ANDROID_HOME/build-tools/34.0.0/aapt dump badging target_app.apk | awk -F"'" '/package: name=/ {print $2}')
            echo "တွေ့ရှိရသော Package Name: $PACKAGE_NAME"
            
            echo "App အား စတင်ဖွင့်လှစ်နေပါသည်..."
            # ရှာဖွေတွေ့ရှိထားသော Package Name ကို သုံးပြီး အလိုအလျောက် လှမ်းဖွင့်ခြင်း
            adb shell monkey -p $PACKAGE_NAME -c android.intent.category.LAUNCHER 1
            
            sleep 5

            # YouTube ပေါ်သို့ Live တွန်းပို့ခြင်း
            echo "==== YouTube သို့ Live Stream စတင်လွှင့်နေပါပြီ ===="
            
            adb shell screenrecord --output-format=h264 --size 1280x720 --bit-rate 2000000 - | \
            ffmpeg -re -i - \
              -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
              -c:v copy \
              -c:a aac -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
