name: Automated Scheduled Live Stream (YouTube Codec Fix)

on:
  workflow_dispatch:

jobs:
  live_stream:
    runs-on: macos-15-intel

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install FFmpeg & Scrcpy
        run: |
          brew update
          brew install ffmpeg scrcpy

      - name: Download APK from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v1.0.0 --repo "pinky3052004-debug/AL100Test" --pattern "my_app.apk" --clobber
          mv my_app.apk target_app.apk

      - name: Setup and Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29          
          target: google_apis    
          arch: x86_64           
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none -memory 3072 -cores 2
          disable-animations: true
          script-timeout-minutes: 120
          
          script: |
            echo "==== Emulator စတင်တက်လာပါပြီ ===="
            adb wait-for-device
            echo "App အား Emulator နောက်ကွယ်မှ ကြိုတင်ထည့်သွင်းနေပါသည်..."
            adb install -r target_app.apk
            
            echo "Emulator Services များ အပြီးသတ်ပွင့်လာသည်အထိ စောင့်ဆိုင်းနေပါသည်..."
            while [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" != "1" ]; do sleep 5; done
            
            echo "==== Emulator ၏ စနစ်တစ်ခုလုံး အပြီးသတ်ပွင့်သွားပါပြီ ===="
            sleep 30
            
            echo "App အား စတင်ဖွင့်လှစ်နေပါသည်: network.kalock.myanmar2d"
            adb shell monkey -p network.kalock.myanmar2d -c android.intent.category.LAUNCHER 1
            sleep 15

            echo "==== YouTube သို့ မပြတ်တောက်သော Live Stream စတင်လွှင့်နေပါပြီ ===="
            
            export SDL_VIDEODRIVER=dummy
            
            # 🚀 🚀 🚀 ပြင်ဆင်ချက် -copy နေရာတွင် YouTube အကြိုက်ဆုံး -c:v libx264 သို့ ပြောင်းလဲပြီး ကောင်းမွန်စွာ Re-encode လုပ်ခိုင်းထားပါသည်။
            # YouTube Stream တည်ငြိမ်စေရန် Keyframe Interval (-g 60) ကိုပါ ထည့်သွင်းပေးထားပါသည်။
            SDL_VIDEODRIVER=dummy scrcpy --no-audio --no-window --max-size=1280 --video-bit-rate=2M --video-codec=h264 --record=- --record-format=mkv | ffmpeg -re -i - -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 -c:v libx264 -preset veryfast -g 60 -s 720x1280 -b:v 2M -c:a aac -b:a 128k -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
