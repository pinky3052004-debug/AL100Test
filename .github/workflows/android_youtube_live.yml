name: Automated Scheduled Live Stream (Anti-Broken-Pipe)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  live_stream:
    runs-on: macos-15-intel
    timeout-minutes: 360

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install FFmpeg & Scrcpy
        run: |
          brew update
          brew install ffmpeg scrcpy

      - name: Download APK from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v1.0.0 \
            --repo "pinky3052004-debug/AL100Test" \
            --pattern "my_app.apk" \
            --clobber
          mv my_app.apk target_app.apk

      - name: Make stream script executable
        run: chmod +x scripts/stream.sh

      - name: Setup and Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio
            -no-boot-anim -camera-back none -camera-front none
            -memory 3072 -cores 2
          disable-animations: true
          script-timeout-minutes: 350
          script: |
            adb wait-for-device
            until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n')" = "1" ]; do sleep 15; done
            until adb shell pm list packages android >/dev/null 2>&1; do sleep 5; done
            adb shell am wait-for-broadcast-idle 2>/dev/null || true
            sleep 60
            adb install -r target_app.apk || { sleep 15 && adb install -r target_app.apk; }
            sleep 10
            adb shell input keyevent KEYCODE_WAKEUP
            adb shell input keyevent KEYCODE_MENU
            sleep 2
            adb shell monkey -p network.kalock.myanmar2d -c android.intent.category.LAUNCHER 1
            sleep 20
            bash scripts/stream.sh
