name: Automated Scheduled Live Stream (Anti-Broken-Pipe)

on:
  workflow_dispatch:

jobs:
  live_stream:
    runs-on: macos-15-intel

    steps:name: Automated Scheduled Live Stream (Anti-Broken-Pipe)

on:
  workflow_dispatch:

jobs:
  live_stream:
    runs-on: macos-15-intel

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install FFmpeg & Scrcpy
        run: |
          brew update
          brew install ffmpeg scrcpy

      - name: Download APK from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GitHub Release ထဲမှ my_app.apk အား ဒေါင်းလုဒ်ဆွဲနေသည်..."
          gh release download v1.0.0 --repo "pinky3052004-debug/AL100Test" --pattern "my_app.apk" --clobber
          mv my_app.apk target_app.apk
          echo "ဒေါင်းလုဒ် အောင်မြင်ပါပြီ။"

      - name: Setup and Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29          
          target: google_apis    
          arch: x86_64           
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none -memory 3072 -cores 2
          disable-animations: true
          script-timeout-minutes: 120
          
          script: |
            echo "==== Emulator စတင်တက်လာပါပြီ ===="
            adb wait-for-device
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၁] - Single-line format ဖြင့် Boot အပြီးသတ်သည်အထိ စောင့်ခြင်း
            echo "Emulator Core Services များ အပြီးသတ်ပွင့်လာသည်အထိ စောင့်ဆိုင်းနေပါသည်..."
            while [ "$(adb shell getprop sys.boot_completed | tr -d '\r\n')" != "1" ]; do echo "Emulator Boot တက်ရန် စောင့်ဆိုင်းနေဆဲဖြစ်ပါသည် (၁၅ စက္ကန့် ထပ်စောင့်ပါမည်)..."; sleep 15; done
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၂] - Single-line format ဖြင့် Package Manager ကို စစ်ဆေးခြင်း
            echo "Package Manager Service အဆင်သင့်ဖြစ်မဖြစ် စစ်ဆေးနေပါသည်..."
            while ! adb shell pm list packages android >/dev/null 2>&1; do echo "Package Manager အဆင်သင့်မဖြစ်သေးပါ။ ၅ စက္ကန့် ထပ်မံစောင့်ဆိုင်းပါမည်..."; sleep 5; done
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၃] - Background Broadcast Services များ အနည်ထိုင်ရန် စောင့်ခြင်း
            echo "စနစ်တစ်ခုလုံး လုံးဝ အနည်ထိုင်သွားစေရန် ၆၀ စက္ကန့် (၁ မိနစ်) စောင့်ဆိုင်းပါမည်..."
            adb shell am wait-for-broadcast-idle || true
            sleep 60
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၄] - Single-line Retry Logic ဖြင့် သားနားစွာ APK သွင်းခြင်း (Syntax Error လုံးဝမတက်စေရ)
            echo "App အား Emulator အတွင်းသို့ စတင်ထည့်သွင်းနေပါသည်..."
            adb install -r target_app.apk || (echo "ပထမအကြိမ် ထည့်သွင်းမှု အဆင်မပြေပါ။ ၁၅ စက္ကန့် စောင့်ပြီး ဒုတိယအကြိမ် ထပ်မံကြိုးစားပါမည်..."; sleep 15; adb install -r target_app.apk)
            sleep 15
            
            # ၅။ App ကို လှမ်းဖွင့်ခြင်း
            echo "App အား စတင်ဖွင့်လှစ်နေပါသည်: network.kalock.myanmar2d"
            adb shell monkey -p network.kalock.myanmar2d -c android.intent.category.LAUNCHER 1
            sleep 15

            echo "==== YouTube သို့ မပြတ်တောက်သော Live Stream စတင်လွှင့်နေပါပြီ ===="
            export SDL_VIDEODRIVER=dummy
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၅] - Broken Pipe မဖြစ်စေရန်နှင့် Stream လုံးဝတည်ငြိမ်စေရန် ပြင်ဆင်ထားသော ပိုက်လိုင်း
            scrcpy --no-audio --no-window --max-size=1280 --video-bit-rate=2M --video-codec=h264 --push-target=none --record=- | \
            ffmpeg -thread_queue_size 1024 -i - \
            -f lavfi -thread_queue_size 1024 -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -c:v libx264 -preset veryfast -tune zerolatency -g 60 \
            -vf "scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2,format=yuv420p" \
            -b:v 2M -maxrate 2M -bufsize 4M \
            -c:a aac -b:a 128k \
            -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install FFmpeg & Scrcpy
        run: |
          brew update
          brew install ffmpeg scrcpy

      - name: Download APK from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GitHub Release ထဲမှ my_app.apk အား ဒေါင်းလုဒ်ဆွဲနေသည်..."
          gh release download v1.0.0 --repo "pinky3052004-debug/AL100Test" --pattern "my_app.apk" --clobber
          mv my_app.apk target_app.apk
          echo "ဒေါင်းလုဒ် အောင်မြင်ပါပြီ။"

      - name: Setup and Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29          
          target: google_apis    
          arch: x86_64           
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none -memory 3072 -cores 2
          disable-animations: true
          script-timeout-minutes: 120
          
          script: |
            echo "==== Emulator စတင်တက်လာပါပြီ ===="
            adb wait-for-device
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၁] - Boot အပြီးသတ်တက်သည်အထိ အသေအချာ စောင့်ခြင်း (tr -d '\r\n' ဖြင့် ပိုမိုတိကျစေသည်)
            echo "Emulator Core Services များ အပြီးသတ်ပွင့်လာသည်အထိ စောင့်ဆိုင်းနေပါသည်..."
            while [ "$(adb shell getprop sys.boot_completed | tr -d '\r\n')" != "1" ]; do echo "Emulator Boot တက်ရန် စောင့်ဆိုင်းနေဆဲဖြစ်ပါသည် (၁၅ စက္ကန့် ထပ်စောင့်ပါမည်)..."; sleep 15; done
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၂] - Package Manager အပြင် Package Installer Service ပါ အလုပ်လုပ်မလုပ် သေချာအောင် စစ်ဆေးခြင်း
            echo "Package Manager Service အဆင်သင့်ဖြစ်မဖြစ် စစ်ဆေးနေပါသည်..."
            while ! adb shell pm list packages android >/dev/null 2>&1; do echo "Package Manager အဆင်သင့်မဖြစ်သေးပါ။ ၅ စက္ကန့် ထပ်မံစောင့်ဆိုင်းပါမည်..."; sleep 5; done
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၃] - နောက်ကွယ်က Background Broadcast Services တွေ အားလုံး အနည်ထိုင်သွားသည်အထိ စောင့်ခြင်း
            echo "စနစ်တစ်ခုလုံး လုံးဝ အနည်ထိုင်သွားစေရန် ၆၀ စက္ကန့် (၁ မိနစ်) စောင့်ဆိုင်းပါမည်..."
            adb shell am wait-for-broadcast-idle || true
            sleep 60
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၄] - ပြတ်တောက်မှုမရှိစေရန် တပ်ဆင်ခြင်း
            echo "App အား Emulator အတွင်းသို့ စတင်ထည့်သွင်းနေပါသည်..."
            if ! adb install -r target_app.apk; then
              echo "ပထမအကြိမ် ထည့်သွင်းမှု အဆင်မပြေပါ။ ၁၅ စက္ကန့် စောင့်ပြီး ဒုတိယအကြိမ် ထပ်မံကြိုးစားပါမည်..."
              sleep 15
              adb install -r target_app.apk
            fi
            sleep 15
            
            # ၅။ App ကို လှမ်းဖွင့်ခြင်း
            echo "App အား စတင်ဖွင့်လှစ်နေပါသည်: network.kalock.myanmar2d"
            adb shell monkey -p network.kalock.myanmar2d -c android.intent.category.LAUNCHER 1
            sleep 15

            echo "==== YouTube သို့ မပြတ်တောက်သော Live Stream စတင်လွှင့်နေပါပြီ ===="
            export SDL_VIDEODRIVER=dummy
            
            # 🚀 [အဆင့်မြှင့်တင်ချက် ၅] - Broken Pipe မဖြစ်စေရန်နှင့် Stream လုံးဝတည်ငြိမ်စေရန် ပြင်ဆင်ထားသော ပိုက်လိုင်း
            scrcpy --no-audio --no-window --max-size=1280 --video-bit-rate=2M --video-codec=h264 --push-target=none --record=- | \
            ffmpeg -thread_queue_size 1024 -i - \
            -f lavfi -thread_queue_size 1024 -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -c:v libx264 -preset veryfast -tune zerolatency -g 60 \
            -vf "scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2,format=yuv420p" \
            -b:v 2M -maxrate 2M -bufsize 4M \
            -c:a aac -b:a 128k \
            -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
