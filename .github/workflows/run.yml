name: Run Myanmar 2D Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget curl

      - name: Install scrcpy
        run: |
          sudo apt-get install -y snapd
          sudo snap install scrcpy

      - name: Download APK from release
        run: |
          curl -L \
            "https://github.com/pinky3052004-debug/AL100Test/releases/download/v1.0.0/app.apk" \
            -o app.apk
          echo "[APK] Downloaded: $(du -sh app.apk)"

      - name: Start Emulator, Launch App and Stream
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: pixel_4
          avd-name: test_avd
          emulator-options: -no-snapshot -no-window -no-audio -gpu swiftshader_indirect
          disable-animations: true
          script: bash scripts/run.sh
        env:
          STREAM_URL: ${{ secrets.STREAM_URL }}
